<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>زرین‌کلیک ۲.۰</title>
    <!-- ===== بارگذاری Supabase با لینک پایدار ===== -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js">
    </script>
    <style>
        /* ===== استایل‌های کامل ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Tahoma', sans-serif;
            background: #0b0e1a;
            color: #fff;
            display: flex;
            justify-content: center;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
        }
        body.light {
            background: #f0f2f5;
            color: #1a1a2e;
        }
        .container {
            max-width: 480px;
            width: 100%;
            background: #141a2b;
            padding: 20px;
            border-radius: 24px;
            border: 1px solid #2a3457;
            transition: background 0.3s, border 0.3s;
            margin-bottom: 80px;
        }
        body.light .container {
            background: #ffffff;
            border: 1px solid #d0d7de;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 28px;
        }
        .box {
            background: #1f2942;
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 15px;
            border: 1px solid #2a3457;
            transition: background 0.3s, border 0.3s;
        }
        body.light .box {
            background: #f6f8fa;
            border: 1px solid #d0d7de;
        }
        .box h3 {
            margin-bottom: 10px;
            color: #ffd200;
        }
        body.light .box h3 {
            color: #f7971e;
        }
        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            margin: 6px 0;
            border-radius: 12px;
            border: none;
            background: #0f1422;
            color: #fff;
            font-size: 15px;
            outline: 1px solid #2a3457;
            transition: background 0.3s, outline 0.3s, color 0.3s;
        }
        body.light input,
        body.light select,
        body.light textarea {
            background: #ffffff;
            color: #1a1a2e;
            outline: 1px solid #d0d7de;
        }
        input:focus,
        select:focus,
        textarea:focus {
            outline: 2px solid #f7971e;
        }
        button {
            width: 100%;
            padding: 12px;
            margin: 6px 0;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #0b0e1a;
        }
        .btn-primary:hover {
            transform: scale(0.98);
        }
        .btn-secondary {
            background: #2a3457;
            color: #fff;
        }
        body.light .btn-secondary {
            background: #d0d7de;
            color: #1a1a2e;
        }
        .btn-danger {
            background: #ff6b6b;
            color: #fff;
        }
        .btn-success {
            background: #92fe9d;
            color: #0b0e1a;
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            width: auto;
            border-radius: 8px;
        }
        .btn-sm.green {
            background: #92fe9d;
            color: #0b0e1a;
        }
        .btn-sm.red {
            background: #ff6b6b;
            color: #fff;
        }
        .btn-sm.blue {
            background: #00c9ff;
            color: #0b0e1a;
        }
        .error {
            color: #ff6b6b;
            font-size: 14px;
        }
        .success {
            color: #92fe9d;
            font-size: 14px;
        }
        .hidden {
            display: none !important;
        }
        .flex {
            display: flex;
            gap: 10px;
        }
        .flex button {
            flex: 1;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            margin-top: 10px;
        }
        th,
        td {
            padding: 8px;
            border-bottom: 1px solid #2a3457;
            text-align: center;
        }
        body.light th,
        body.light td {
            border-bottom: 1px solid #d0d7de;
        }
        th {
            color: #8892b0;
        }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2942;
            color: #fff;
            padding: 12px 24px;
            border-radius: 16px;
            border: 2px solid #f7971e;
            z-index: 9999;
            font-weight: 700;
            display: none;
            max-width: 90%;
            text-align: center;
            transition: background 0.3s, border 0.3s, color 0.3s;
        }
        body.light .toast {
            background: #ffffff;
            color: #1a1a2e;
            border: 2px solid #f7971e;
        }
        .toast.show {
            display: block;
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        .balance-amount {
            font-size: 32px;
            font-weight: 900;
            color: #ffd200;
        }
        .balance-amount small {
            font-size: 16px;
            color: #8892b0;
        }
        .ad-item {
            background: #0f1422;
            padding: 12px;
            border-radius: 12px;
            border-right: 4px solid #f7971e;
            margin-bottom: 10px;
            transition: background 0.3s;
        }
        body.light .ad-item {
            background: #f6f8fa;
        }
        .ad-item .title {
            font-weight: 700;
            font-size: 16px;
        }
        .ad-item .desc {
            font-size: 13px;
            color: #8892b0;
        }
        .ad-item .category {
            font-size: 11px;
            background: #1f2942;
            padding: 2px 10px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 4px;
            color: #8892b0;
        }
        body.light .ad-item .category {
            background: #d0d7de;
        }
        .ad-item .budget {
            font-size: 13px;
            color: #92fe9d;
            margin-top: 4px;
        }
        .ad-item .click-btn {
            background: #00c9ff;
            color: #0b0e1a;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            margin-top: 8px;
            width: auto;
        }
        .ad-item .click-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            padding: 6px 0;
            border-bottom: 1px solid #2a3457;
        }
        body.light .history-item {
            border-bottom: 1px solid #d0d7de;
        }
        .green {
            color: #92fe9d;
        }
        .red {
            color: #ff6b6b;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0f1422;
            border-top: 1px solid #2a3457;
            display: flex;
            justify-content: space-around;
            padding: 8px 0 12px 0;
            max-width: 480px;
            margin: 0 auto;
            z-index: 1000;
            border-radius: 20px 20px 0 0;
            width: 100%;
            transition: background 0.3s, border 0.3s;
        }
        body.light .bottom-nav {
            background: #ffffff;
            border-top: 1px solid #d0d7de;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            background: none;
            border: none;
            color: #8892b0;
            font-size: 10px;
            cursor: pointer;
            padding: 4px 8px;
            flex: 1;
            max-width: 70px;
            transition: color 0.3s;
        }
        body.light .nav-item {
            color: #6e7681;
        }
        .nav-item .icon {
            font-size: 24px;
            line-height: 1;
        }
        .nav-item.active {
            color: #f7971e;
        }
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 10px;
            border: 3px solid #f7971e;
        }
        .wheel-container {
            display: flex;
            justify-content: center;
            margin: 15px 0;
        }
        .wheel {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: conic-gradient(#f7971e 0deg 60deg,
                    #ffd200 60deg 120deg,
                    #f7971e 120deg 180deg,
                    #ffd200 180deg 240deg,
                    #f7971e 240deg 300deg,
                    #ffd200 300deg 360deg);
            position: relative;
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            cursor: pointer;
            border: 4px solid #fff;
            box-shadow: 0 0 30px rgba(247, 151, 30, 0.3);
        }
        .wheel-pointer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 40px;
            pointer-events: none;
            z-index: 5;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.9);
        }
        .wheel::after {
            content: '▼';
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            color: #fff;
            z-index: 10;
        }
        .prize-display {
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            margin-top: 10px;
            color: #ffd200;
            min-height: 40px;
        }
        .wheel-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            font-size: 11px;
            color: #8892b0;
        }
        .wheel-legend .dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 3px;
            margin-left: 4px;
        }
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #1f2942;
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            font-size: 24px;
            cursor: pointer;
            z-index: 999;
            transition: background 0.3s;
        }
        body.light .theme-toggle {
            background: #d0d7de;
        }
        .badge-pro {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #0b0e1a;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            display: inline-block;
        }
        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }
            .balance-amount {
                font-size: 26px;
            }
            .wheel {
                width: 160px;
                height: 160px;
            }
            .wheel-pointer {
                font-size: 30px;
            }
            .theme-toggle {
                top: 10px;
                right: 10px;
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <div id="toast" class="toast"></div>

    <div class="container" id="app">
        <h1>💰 زرین‌کلیک ۲.۰</h1>

        <!-- ===== صفحه ورود/ثبت‌نام ===== -->
        <div id="authPage">
            <div class="box" id="registerBox">
                <h3>ثبت‌نام</h3>
                <input type="email" id="regEmail" placeholder="ایمیل">
                <input type="password" id="regPassword" placeholder="رمز عبور (حداقل ۶ کاراکتر)">
                <input type="text" id="regRef" placeholder="کد معرف (اختیاری)">
                <button class="btn-primary" onclick="registerUser()">ثبت‌نام</button>
                <p id="regMessage"></p>
            </div>
            <div class="box" id="loginBox">
                <h3>ورود</h3>
                <input type="email" id="loginEmail" placeholder="ایمیل">
                <input type="password" id="loginPassword" placeholder="رمز عبور">
                <button class="btn-primary" onclick="loginUser()">ورود</button>
                <p id="loginMessage"></p>
            </div>
        </div>

        <!-- ===== صفحه خانه ===== -->
        <div id="homePage" class="hidden">
            <div class="box">
                <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
                    <span>خوش آمدید، <strong id="userEmailDisplay">---</strong></span>
                    <span id="userProBadge"></span>
                    <button class="btn-sm" style="background:#f7971e;color:#0b0e1a;" onclick="toggleAdminPanel()">👑 ادمین</button>
                </div>
            </div>

            <!-- تبلیغات -->
            <div id="adsSection">
                <div class="box">
                    <h3>📢 تبلیغات</h3>
                    <div id="adFeed"><div style="color:#8892b0;text-align:center;">در حال بارگذاری...</div></div>
                </div>
            </div>

            <!-- تاریخچه -->
            <div class="box" style="max-height:150px;overflow-y:auto;">
                <div style="font-size:13px;color:#8892b0;margin-bottom:5px;">📜 تاریخچه</div>
                <div id="historyList"><div style="color:#4a5a7a;text-align:center;font-size:13px;">هیچ تراکنشی ثبت نشده</div></div>
            </div>

            <!-- کیف پول -->
            <div class="box">
                <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;">
                    <div>
                        <div style="font-size:13px;color:#8892b0;">کیف پول اصلی</div>
                        <div class="balance-amount" id="walletMain">0 <small>تومان</small></div>
                    </div>
                    <div>
                        <div style="font-size:13px;color:#8892b0;">کیف پول تبلیغ</div>
                        <div class="balance-amount" id="walletAds" style="color:#92fe9d;">0 <small>تومان</small></div>
                    </div>
                </div>
            </div>

            <!-- دکمه‌های کیف پول -->
            <div class="box">
                <button class="btn-primary" onclick="clickAd()">👆 کلیک روی تبلیغ (۱۰۰ تومان)</button>
                <div class="flex" style="margin-top:6px;">
                    <button class="btn-secondary" onclick="transferToMain()">⬅️ انتقال به اصلی</button>
                    <button class="btn-secondary" onclick="withdrawFromAds()">🏦 برداشت</button>

            </div>

            <!-- گردونه شانس -->
            <div class="box">
                <h3>🎡 گردونه شانس</h3>
                <div class="wheel-container">
                    <div class="wheel" id="wheel" onclick="spinWheel()">
                        <div class="wheel-pointer">🎯</div>
                    </div>
                </div>
                <div class="wheel-legend">
                    <span><span class="dot" style="background:#f7971e;"></span> ۵,۰۰۰</span>
                    <span><span class="dot" style="background:#ffd200;"></span> ۱,۰۰۰</span>
                    <span><span class="dot" style="background:#f7971e;"></span> ۵۰۰</span>
                    <span><span class="dot" style="background:#ffd200;"></span> پوچ</span>
                    <span><span class="dot" style="background:#f7971e;"></span> پوچ</span>
                    <span><span class="dot" style="background:#ffd200;"></span> پوچ</span>
                </div>
                <div id="prizeResult" class="prize-display">برای چرخش کلیک کنید</div>
                <button class="btn-secondary" onclick="spinWheel()">🔄 چرخش</button>
            </div>

            <!-- خروج -->
            <button class="btn-danger" onclick="logoutUser()">🚪 خروج</button>
        </div>

        <!-- ===== پنل ادمین (مخفی) ===== -->
        <div id="adminPanel" class="hidden">
            <div class="box">
                <h3>👑 پنل ادمین</h3>
                <button class="btn-secondary" onclick="loadAdminData()">🔄 بارگذاری</button>
                <button class="btn-sm" style="background:#ff6b6b;color:#fff;" onclick="closeAdminPanel()">❌ بستن</button>
                <hr style="border-color:#2a3457;margin:10px 0;">

                <h4>👥 کاربران</h4>
                <div id="adminUsers" style="max-height:200px;overflow-y:auto;"></div>

                <h4 style="margin-top:10px;">🏦 درخواست‌های برداشت</h4>
                <div id="adminWithdrawals" style="max-height:200px;overflow-y:auto;"></div>

                <h4 style="margin-top:10px;">📊 آمار</h4>
                <div id="adminStats"></div>

    </div>

    <!-- ===== منوی پایین ===== -->
    <div class="bottom-nav" id="bottomNav" style="display:none;">
        <button class="nav-item active" onclick="showHome()">
            <span class="icon">🏠</span><span>خانه</span>
        </button>
        <button class="nav-item" onclick="showWallet()">
            <span class="icon">💰</span><span>کیف پول</span>
        </button>
        <button class="nav-item" onclick="showProfile()">
            <span class="icon">👤</span><span>پروفایل</span>
        </button>
    </div>

    <!-- ============================================================ -->
    <!-- جاواسکریپت کامل نسخه ۲.۰ با Supabase -->
    <!-- ============================================================ -->
    <script>
        // ================================================================
        // ۰. بررسی بارگذاری کتابخانه Supabase
        // ================================================================
        (function checkSupabase() {
            if (typeof supabase === 'undefined') {
                document.body.innerHTML = `
                    <div style="text-align:center;padding:50px;color:#ff6b6b;font-family:sans-serif;">
                        <h2>❌ خطا در بارگذاری</h2>
                        <p>کتابخانه Supabase بارگذاری نشد.</p>
                        <p>لطفاً اتصال اینترنت را بررسی کرده و صفحه را دوباره بارگذاری کنید.</p>
                        <button onclick="location.reload()" style="margin-top:20px;padding:10px 20px;font-size:16px;cursor:pointer;border-radius:12px;border:none;background:#f7971e;color:#0b0e1a;font-weight:700;">
                            🔄 تلاش مجدد
                        </button>
                    </div>
                `;
                throw new Error('Supabase library failed to load');
            }
            console.log('✅ Supabase loaded successfully');
        })();

        // ================================================================
        // ۱. اتصال به Supabase
        // ================================================================
        const supabaseClient = supabase.createClient(
            'https://fpogciahtzacgrglhmnx.supabase.co',
            'sb_publishable_Gb3p43CBeX1VFOOzVtdI0w_IqNrVuEm'
        );

        // ================================================================
        // ۲. متغیرهای سراسری
        // ================================================================
        let currentUser = null;
        const ADMIN_EMAIL = 'mhmdhsnjlyly140@gmail.com';
        let wheelSpinning = false;
        let allAds = [];

        // ================================================================
        // ۳. توابع کمکی
        // ================================================================
        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show';
            t.style.borderColor = type === 'error' ? '#ff6b6b' : '#92fe9d';
            clearTimeout(t._timer);
            t._timer = setTimeout(() => { t.className = 'toast'; }, 3000);
        }

        function getToday() {
            return new Date().toISOString().split('T')[0];
        }

        function obfuscateEmail(email) {
            if (!email) return '---';
            let parts = email.split('@');
            if (parts[0].length <= 3) return parts[0] + '***@' + parts[1];
            return parts[0].slice(0, 3) + '***@' + parts[1];
        }

        function generateRefCode() {
            return 'REF' + Math.floor(1000 + Math.random() * 9000);
        }

        function formatTime(ts) {
            if (!ts) return '';
            return new Date(ts).toLocaleTimeString('fa-IR');
        }

        // ================================================================
        // ۴. تم (روشن/تاریک)
        // ================================================================
        function toggleTheme() {
            document.body.classList.toggle('light');
            const btn = document.getElementById('themeBtn');
            btn.textContent = document.body.classList.contains('light') ? '🌙' : '☀️';
            localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
        }

        (function loadTheme() {
            if (localStorage.getItem('theme') === 'light') {
                document.body.classList.add('light');
                document.getElementById('themeBtn').textContent = '🌙';
            }
        })();

        // ================================================================
        // ۵. احراز هویت
        // ================================================================
        window.registerUser = async function() {
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const ref = document.getElementById('regRef').value.trim().toUpperCase() || '';

            if (!email || !password) {
                document.getElementById('regMessage').innerHTML = '<span class="error">ایمیل و رمز را پر کنید</span>';
                return;
            }
            if (password.length < 6) {
                document.getElementById('regMessage').innerHTML = '<span class="error">رمز حداقل ۶ کاراکتر</span>';
                return;
            }

            try {
                // چک تکراری نبودن ایمیل
                const { data: existing } = await supabaseClient
                    .from('users')
                    .select('email')
                    .eq('email', email);

                if (existing && existing.length > 0) {
                    document.getElementById('regMessage').innerHTML = '<span class="error">این ایمیل قبلاً ثبت شده</span>';
                    return;
                }

                const refCode = generateRefCode();
                const role = (email === ADMIN_EMAIL) ? 'admin' : 'user';
                const now = Date.now();

                const { error } = await supabaseClient
                    .from('users')
                    .insert([{
                        email,
                        password,
                        ref_code: refCode,
                        referred_by: ref || null,
                        referrals: [],
                        balance: 0,
                        ad_balance: 0,
                        daily_click_count: 0,
                        last_click_date: null,
                        history: [],
                        role: role,
                        total_earnings: 0,
                        total_ads_created: 0,
                        is_pro: false,
                        ad_click_counts: {},
                        join_date: now,
                        ratings: {},
                        last_spin: null,
                        created_at: new Date().toISOString()
                    }]);

                if (error) {
                    document.getElementById('regMessage').innerHTML = '<span class="error">' + error.message + '</span>';
                } else {
                    document.getElementById('regMessage').innerHTML =
                    '<span class="success">✅ ثبت‌نام موفق! وارد شوید.</span>';
                    document.getElementById('regEmail').value = '';
                    document.getElementById('regPassword').value = '';
                    document.getElementById('regRef').value = '';
                }
            } catch (err) {
                document.getElementById('regMessage').innerHTML = '<span class="error">' + err.message + '</span>';
            }
        };

        window.loginUser = async function() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            if (!email || !password) {
                document.getElementById('loginMessage').innerHTML = '<span class="error">ایمیل و رمز را پر کنید</span>';
                return;
            }

            try {
                const { data, error } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('email', email)
                    .eq('password', password);

                if (error || data.length === 0) {
                    document.getElementById('loginMessage').innerHTML =
                    '<span class="error">ایمیل یا رمز اشتباه است</span>';
                } else {
                    currentUser = data[0];
                    localStorage.setItem('currentUserEmail', email);
                    document.getElementById('loginMessage').innerHTML = '';
                    showToast('✅ خوش آمدید', 'success');
                    enterApp();
                }
            } catch (err) {
                document.getElementById('loginMessage').innerHTML = '<span class="error">' + err.message + '</span>';
            }
        };

        window.logoutUser = function() {
            localStorage.removeItem('currentUserEmail');
            currentUser = null;
            document.getElementById('authPage').classList.remove('hidden');
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('bottomNav').style.display = 'none';
            document.getElementById('adminPanel').classList.add('hidden');
            showToast('🚪 خارج شدید', 'success');
        };

        // ================================================================
        // ۶. ورود به برنامه
        // ================================================================
        function enterApp() {
            document.getElementById('authPage').classList.add('hidden');
            document.getElementById('homePage').classList.remove('hidden');
            document.getElementById('bottomNav').style.display = 'flex';
            document.getElementById('userEmailDisplay').textContent = currentUser.email || '---';

            // نشان پرو
            const proBadge = document.getElementById('userProBadge');
            if (currentUser.is_pro) {
                proBadge.innerHTML = '<span class="badge-pro">⭐ پرو</span>';
            } else {
                proBadge.innerHTML = '';
            }

            renderAll();
        }

        // ================================================================
        // ۷. نمایش صفحات
        // ================================================================
        window.showHome = function() {
            document.getElementById('adsSection').classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.querySelector('.nav-item:first-child').classList.add('active');
            renderAds();
        };

        window.showWallet = function() {
            document.getElementById('adsSection').classList.add('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.querySelector('.nav-item:nth-child(2)').classList.add('active');
            renderWallet();
        };

        window.showProfile = function() {
            document.getElementById('adsSection').classList.add('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.querySelector('.nav-item:nth-child(3)').classList.add('active');
            renderProfile();
        };

        // ================================================================
        // ۸. رندر همه
        // ================================================================
        function renderAll() {
            renderWallet();
            renderAds();
            renderHistory();
            renderProfile();
        }

        // ================================================================
        // ۹. کیف پول
        // ================================================================
        function renderWallet() {
            if (!currentUser) return;
            document.getElementById('walletMain').innerHTML = (currentUser.balance || 0).toLocaleString() +
                ' <small>تومان</small>';
            document.getElementById('walletAds').innerHTML = (currentUser.ad_balance || 0).toLocaleString() +
                ' <small>تومان</small>';
        }

        // ================================================================
        // ۱۰. کلیک روی تبلیغ
        // ================================================================
        window.clickAd = async function() {
            if (!currentUser) { showToast('❌ وارد شوید', 'error'); return; }

            const today = getToday();
            if (currentUser.last_click_date !== today) {
                currentUser.daily_click_count = 0;
                currentUser.last_click_date = today;
            }

            // محاسبه حداکثر کلیک
            let maxClicks = 10 + Math.floor((currentUser.referrals || []).length / 5);
            if (currentUser.is_pro) maxClicks = 99999;

            if ((currentUser.daily_click_count || 0) >= maxClicks) {
                showToast(`❌ امروز ${maxClicks} کلیک کامل کردید`, 'error');
                return;
            }

            try {
                const amount = 100;
                const newAdBalance = (currentUser.ad_balance || 0) + amount;
                const newDailyClicks = (currentUser.daily_click_count || 0) + 1;

                const { error } = await supabaseClient
                    .from('users')
                    .update({
                        ad_balance: newAdBalance,
                        daily_click_count: newDailyClicks,
                        last_click_date: today
                    })
                    .eq('email', currentUser.email);

                if (error) { showToast('❌ خطا: ' + error.message, 'error'); return; }

                currentUser.ad_balance = newAdBalance;
                currentUser.daily_click_count = newDailyClicks;
                currentUser.last_click_date = today;

                // تاریخچه
                const history = currentUser.history || [];
                history.push({
                    desc: 'کلیک روی تبلیغ',
                    amount: `+${amount}`,
                    type: 'green',
                    time: new Date().toLocaleTimeString('fa-IR')
                });

                const { error: histErr } = await supabaseClient
                    .from('users')
                    .update({ history: history })
                    .eq('email', currentUser.email);

                if (!histErr) currentUser.history = history;

                renderAll();
                showToast(`✅ ${amount} تومان به کیف پول تبلیغ اضافه شد`, 'success');
            } catch (err) {
                showToast('❌ خطا: ' + err.message, 'error');
            }
        };

        // ================================================================
        // ۱۱. انتقال به کیف پول اصلی
        // ================================================================
        window.transferToMain = async function() {
            if (!currentUser) { showToast('❌ وارد شوید', 'error'); return; }

            const amount = currentUser.ad_balance || 0;
            if (amount < 20000) {
                showToast('❌ حداقل انتقال ۲۰,۰۰۰ تومان', 'error');
                return;
            }

            const fee = Math.round(amount * 0.1);
            const netAmount = amount - fee;

            try {
                const newMain = (currentUser.balance || 0) + netAmount;
                const newAd = 0;

                const { error } = await supabaseClient
                    .from('users')
                    .update({ balance: newMain, ad_balance: newAd })
                    .eq('email', currentUser.email);

                if (error) { showToast('❌ خطا: ' + error.message, 'error'); return; }

                currentUser.balance = newMain;
                currentUser.ad_balance = newAd;

                const history = currentUser.history || [];
                history.push({
                    desc: `انتقال از تبلیغ به اصلی (کارمزد ${fee} تومان)`,
                    amount: `+${netAmount}`,
                    type: 'green',
                    time: new Date().toLocaleTimeString('fa-IR')
                });

                await supabaseClient
                    .from('users')
                    .update({ history: history })
                    .eq('email', currentUser.email);

                currentUser.history = history;

                renderAll();
                showToast(`✅ ${netAmount.toLocaleString()} تومان به کیف پول اصلی منتقل شد`, 'success');
            } catch (err) {
                showToast('❌ خطا: ' + err.message, 'error');
            }
        };

        // ================================================================
        // ۱۲. برداشت از کیف پول تبلیغ
        // ================================================================
        window.withdrawFromAds = async function() {
            if (!currentUser) { showToast('❌ وارد شوید', 'error'); return; }

            const amount = parseInt(prompt('مبلغ برداشت (حداقل ۱۰۰,۰۰۰ تومان):'));
            if (!amount || amount < 100000) {
                showToast('❌ حداقل ۱۰۰,۰۰۰ تومان', 'error');
                return;
            }

            if (amount > (currentUser.ad_balance || 0)) {
                showToast('❌ موجودی کافی نیست', 'error');
                return;
            }

            const fee = Math.round(amount * 0.1);
            const netAmount = amount - fee;

            try {
                const newAd = (currentUser.ad_balance || 0) - amount;

                const { error } = await supabaseClient
                    .from('users')
                    .update({ ad_balance: newAd })
                    .eq('email', currentUser.email);

                if (error) { showToast('❌ خطا: ' + error.message, 'error'); return; }

                currentUser.ad_balance = newAd;

                // ثبت درخواست برداشت
                const { error: wError } = await supabaseClient
                    .from('withdraw_requests')
                    .insert([{
                        id: 'wd_' + Date.now(),
                        user_email: currentUser.email,
                        amount: amount,
                        net_amount: netAmount,
                        fee: fee,
                        wallet: 'ad_balance',
                        wallet_name: 'کیف پول تبلیغ',
                        card_number: '',
                        iban: '',
                        status: 'pending',
                        created_at: new Date().toISOString()
                    }]);

                if (wError) { showToast('❌ خطا در ثبت درخواست: ' + wError.message, 'error'); return; }

                const history = currentUser.history || [];
                history.push({
                    desc: `درخواست برداشت ${amount} تومان`,
                    amount: `-${amount}`,
                    type: 'red',
                    time: new Date().toLocaleTimeString('fa-IR')
                });

                await supabaseClient
                    .from('users')
                    .update({ history: history })
                    .eq('email', currentUser.email);

                currentUser.history = history;

                renderAll();
                showToast(`✅ درخواست برداشت ${amount.toLocaleString()} تومان ثبت شد`, 'success');
            } catch (err) {
                showToast('❌ خطا: ' + err.message, 'error');
            }
        };

        // ================================================================
        // ۱۳. گردونه شانس
        // ================================================================
        window.spinWheel = async function() {
            if (!currentUser) { showToast('❌ وارد شوید', 'error'); return; }
            if (wheelSpinning) return;

            const lastSpin = currentUser.last_spin ? new Date(currentUser.last_spin) : null;
            const now = new Date();
            if (lastSpin && (now - lastSpin) < 48 * 60 * 60 * 1000) {
                const remaining = Math.ceil(48 - (now - lastSpin) / (1000 * 60 * 60));
                showToast(`⏳ ${remaining} ساعت تا چرخش بعدی`, 'error');
                return;
            }

            wheelSpinning = true;
            const wheel = document.getElementById('wheel');
            const resultDiv = document.getElementById('prizeResult');

            const prizes = [
                { name: '۵,۰۰۰ تومان', value: 5000 },
                { name: '۱,۰۰۰ تومان', value: 1000 },
                { name: '۵۰۰ تومان', value: 500 },
                { name: 'پوچ!', value: 0 },
                { name: 'پوچ!', value: 0 },
                { name: 'پوچ!', value: 0 }
            ];

            const randomIndex = Math.floor(Math.random() * prizes.length);
            const deg = 360 * 5 + randomIndex * 60;
            wheel.style.transform = `rotate(${deg}deg)`;

            setTimeout(async () => {
                const prize = prizes[randomIndex];

                try {
                    if (prize.value > 0) {
                        const newBalance = (currentUser.balance || 0) + prize.value;

                        const { error } = await supabaseClient
                            .from('users')
                            .update({
                                balance: newBalance,
                                last_spin: now.toISOString()
                            })
                            .eq('email', currentUser.email);

                        if (error) { showToast('❌ خطا: ' + error.message, 'error'); return; }

                        currentUser.balance = newBalance;
                        currentUser.last_spin = now.toISOString();

                        const history = currentUser.history || [];
                        history.push({
                            desc: `جایزه گردونه شانس`,
                            amount: `+${prize.value}`,
                            type: 'green',
                            time: new Date().toLocaleTimeString('fa-IR')
                        });

                        await supabaseClient
                            .from('users')
                            .update({ history: history })
                            .eq('email', currentUser.email);

                        currentUser.history = history;

                        resultDiv.textContent = `🎉 ${prize.name} به کیف پول اصلی اضافه شد!`;
                        showToast(`💰 ${prize.value.toLocaleString()} تومان اضافه شد!`, 'success');
                    } else {
                        const { error } = await supabaseClient
                            .from('users')
                            .update({ last_spin: now.toISOString() })
                            .eq('email', currentUser.email);

                        if (!error) currentUser.last_spin = now.toISOString();
                        resultDiv.textContent = '😐 متأسفانه هیچی!';
                        showToast('😐 شانس نیاوردید!', 'info');
                    }

                    renderAll();
                } catch (err) {
                    showToast('❌ خطا: ' + err.message, 'error');
                }
                wheelSpinning = false;
            }, 4000);
        };

        // ================================================================
        // ۱۴. تبلیغات
        // ================================================================
        async function renderAds() {
            try {
                const { data, error } = await supabaseClient
                    .from('ads')
                    .select('*')
                    .eq('status', 'active');

                if (error) {
                    document.getElementById('adFeed').innerHTML = '<div style="color:#8892b0;">خطا در بارگذاری</div>';
                    return;
                }

                allAds = data || [];

                if (allAds.length === 0) {
                    document.getElementById('adFeed').innerHTML =
                        '<div style="color:#4a5a7a;text-align:center;">هیچ تبلیغی فعال نیست</div>';
                    return;
                }

                let html = '';
                allAds.forEach(ad => {
                    const isClicked = currentUser && (currentUser.ad_click_counts || {})[ad.id] === true;
                    html += `
                        <div class="ad-item">
                            <div class="title">${ad.title}</div>
                            <div class="desc">${ad.desc || ''}</div>
                            <span class="category">${ad.category || 'سایر'}</span>
                            <div class="budget">💰 باقیمانده: ${ad.remaining_budget || 0} تومان | هر کلیک: ${Math.round((ad.cpc || 500) / 10)} تومان</div>
                            <button class="click-btn" onclick="clickAd()" ${isClicked ? 'disabled' : ''}>
                                ${isClicked ? '✅ کلیک شده' : '👆 کلیک کن'}
                            </button>
                        </div>
                    `;
                });
                document.getElementById('adFeed').innerHTML = html;
            } catch (err) {
                document.getElementById('adFeed').innerHTML = '<div style="color:#8892b0;">خطا در بارگذاری</div>';
            }
        }

        // ================================================================
        // ۱۵. تاریخچه
        // ================================================================
        function renderHistory() {
            if (!currentUser) return;
            const hist = currentUser.history || [];
            if (hist.length === 0) {
                document.getElementById('historyList').innerHTML =
                    '<div style="color:#4a5a7a;text-align:center;font-size:13px;">هیچ تراکنشی ثبت نشده</div>';
                return;
            }
            let html = '';
            hist.slice(-8).reverse().forEach(item => {
                const cls = item.type === 'green' ? 'green' : 'red';
                html += `
                    <div class="history-item">
                        <span>${item.desc}</span>
                        <span class="${cls}">${item.amount} تومان</span>
                        <span style="color:#4a5a7a;font-size:11px;">${item.time || ''}</span>
                    </div>
                `;
            });
            document.getElementById('historyList').innerHTML = html;
        }

        // ================================================================
        // ۱۶. پروفایل
        // ================================================================
        function renderProfile() {
            if (!currentUser) return;
            // پروفایل ساده - برای نمایش اطلاعات کاربر
            const profileHtml = `
                <div class="box">
                    <div class="profile-avatar">👤</div>
                    <p style="text-align:center;font-size:16px;font-weight:700;">${currentUser.email}</p>
                    <p style="text-align:center;color:#8892b0;font-size:13px;">نقش: ${currentUser.role === 'admin' ? '👑 ادمین' : '👤 کاربر'}</p>
                    <p style="text-align:center;color:#8892b0;font-size:13px;">کد معرف: ${currentUser.ref_code || 'ندارد'}</p>
                    <p style="text-align:center;color:#8892b0;font-size:13px;">زیرمجموعه: ${(currentUser.referrals || []).length} نفر</p>
                    <p style="text-align:center;color:#8892b0;font-size:13px;">مجموع درآمد: ${(currentUser.total_earnings || 0).toLocaleString()} تومان</p>
                    ${currentUser.is_pro ? '<p style="text-align:center;color:#ffd200;font-size:14px;">⭐ نسخه پرو فعال</p>' : ''}
                </div>
            `;
            // قرار دادن در صفحه - از قبل بخشی برای پروفایل نداریم، در آینده می‌توان اضافه کرد
        }

        // ================================================================
        // ۱۷. پنل ادمین
        // ================================================================
        window.toggleAdminPanel = function() {
            if (!currentUser || currentUser.email !== ADMIN_EMAIL) {
                showToast('⛔ دسترسی غیرمجاز', 'error');
                return;
            }
            const panel = document.getElementById('adminPanel');
            panel.classList.toggle('hidden');
            if (!panel.classList.contains('hidden')) {
                loadAdminData();
            }
        };

        window.closeAdminPanel = function() {
            document.getElementById('adminPanel').classList.add('hidden');
        };

        window.loadAdminData = async function() {
            if (!currentUser || currentUser.email !== ADMIN_EMAIL) return;

            try {
                // کاربران
                const { data: users } = await supabaseClient
                    .from('users')
                    .select('email, balance, ad_balance, referrals, role, is_pro');

                let usersHtml =
                    '<table><tr><th>ایمیل</th><th>کیف پول اصلی</th><th>کیف پول تبلیغ</th><th>زیرمجموعه</th><th>نقش</th></tr>';
                (users || []).forEach(u => {
                    usersHtml += `<tr>
                        <td>${obfuscateEmail(u.email)}</td>
                        <td>${u.balance || 0}</td>
                        <td>${u.ad_balance || 0}</td>
                        <td>${(u.referrals || []).length}</td>
                        <td>${u.role === 'admin' ? '👑' : u.is_pro ? '⭐' : ''}</td>
                    </tr>`;
                });
                usersHtml += '</table>';
                document.getElementById('adminUsers').innerHTML = usersHtml;

                // درخواست‌های برداشت
                const { data: withdraws } = await supabaseClient
                    .from('withdraw_requests')
                    .select('*')
                    .eq('status', 'pending');

                let wHtml = '<table><tr><th>کاربر</th><th>مبلغ</th><th>عملیات</th></tr>';
                (withdraws || []).forEach(w => {
                    wHtml += `<tr>
                        <td>${obfuscateEmail(w.user_email)}</td>
                        <td>${w.amount}</td>
                        <td>
                            <button class="btn-sm green" onclick="approveWithdraw('${w.id}')">✅</button>
                            <button class="btn-sm red" onclick="rejectWithdraw('${w.id}')">❌</button>
                        </td>
                    </tr>`;
                });
                wHtml += '</table>';
                document.getElementById('adminWithdrawals').innerHTML = wHtml || '<p>هیچ درخواستی نیست</p>';

                // آمار
                const { count } = await supabaseClient
                    .from('users')
                    .select('*', { count: 'exact', head: true });

                document.getElementById('adminStats').innerHTML =
                    `<p>👥 تعداد کاربران: ${count || 0}</p>`;

            } catch (err) {
                showToast('❌ خطا در بارگذاری', 'error');
            }
        };

        window.approveWithdraw = async function(id) {
            if (!confirm('تأیید برداشت؟')) return;
            try {
                const { error } = await supabaseClient
                    .from('withdraw_requests')
                    .update({ status: 'approved' })
                    .eq('id', id);

                if (error) { showToast('❌ خطا: ' + error.message, 'error'); return; }

                showToast('✅ تأیید شد', 'success');
                loadAdminData();
            } catch (err) {
                showToast('❌ خطا', 'error');
            }
        };

        window.rejectWithdraw = async function(id) {
            if (!confirm('رد برداشت؟')) return;
            try {
                const { error } = await supabaseClient
                    .from('withdraw_requests')
                    .update({ status: 'rejected' })
                    .eq('id', id);

                if (error) { showToast('❌ خطا: ' + error.message, 'error'); return; }

                showToast('❌ رد شد', 'error');
                loadAdminData();
            } catch (err) {
                showToast('❌ خطا', 'error');
            }
        };

        // ================================================================
        // ۱۸. شروع برنامه
        // ================================================================
        (async function init() {
            const email = localStorage.getItem('currentUserEmail');
            if (email) {
                try {
                    const { data, error } = await supabaseClient
                        .from('users')
                        .select('*')
                        .eq('email', email);

                    if (!error && data && data.length > 0) {
                        currentUser = data[0];
                        enterApp();
                        return;
                    }
                } catch (e) { /* ignore */ }
            }
            document.getElementById('authPage').classList.remove('hidden');
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('bottomNav').style.display = 'none';
        })();

        console.log('✅ زرین‌کلیک ۲.۰ با Supabase راه‌اندازی شد!');
        console.log('👑 ادمین:', ADMIN_EMAIL);
    </script>
</body>
