<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>زرین‌کلیک</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Tahoma, sans-serif; max-width: 500px; margin: auto; padding: 20px; background: #f5f5f5; }
        .box { background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 6px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        button:hover { background: #218838; }
        .hidden { display: none; }
        .error { color: red; }
        .success { color: green; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 6px; text-align: center; }
        th { background: #4CAF50; color: white; }
        .btn-sm { padding: 4px 8px; font-size: 11px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-sm.green { background: #92fe9d; color: #000; }
        .btn-sm.red { background: #ff6b6b; color: #fff; }
        .btn-sm.blue { background: #00c9ff; color: #000; }
        .admin-only { display: none; }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #222; color: #fff; padding: 12px 24px; border-radius: 12px; z-index: 9999; display: none; }
    </style>
</head>
<body>

    <div id="toast" class="toast"></div>

    <h1>💰 زرین‌کلیک</h1>

    <!-- =========================== -->
    <!-- صفحه ورود / ثبت‌نام -->
    <!-- =========================== -->
    <div id="authPage">
        <div class="box" id="registerBox">
            <h3>ثبت‌نام</h3>
            <input type="email" id="regEmail" placeholder="ایمیل">
            <input type="password" id="regPassword" placeholder="رمز عبور">
            <button onclick="registerUser()">ثبت‌نام</button>
            <p id="regMessage"></p>
        </div>
        <div class="box" id="loginBox">
            <h3>ورود</h3>
            <input type="email" id="loginEmail" placeholder="ایمیل">
            <input type="password" id="loginPassword" placeholder="رمز عبور">
            <button onclick="loginUser()">ورود</button>
            <p id="loginMessage"></p>
        </div>
    </div>

    <!-- =========================== -->
    <!-- داشبورد کاربر -->
    <!-- =========================== -->
    <div id="dashboard" class="hidden">
        <div class="box">
            <h3>خوش آمدید، <span id="userEmail"></span></h3>
            <button onclick="logoutUser()" style="background:#dc3545;">خروج</button>
            <hr>
            <button onclick="showAdminPanel()" style="background:#f7971e;">👑 پنل ادمین</button>
        </div>

        <!-- پنل ادمین (مخفی) -->
        <div id="adminPanel" class="hidden">
            <div class="box">
                <h3>📊 پنل ادمین</h3>
                <button onclick="loadUsers()">🔄 بارگذاری کاربران</button>
                <button onclick="loadWithdrawals()">🔄 درخواست‌های برداشت</button>
                <button onclick="hideAdminPanel()" style="background:#dc3545;">❌ بستن</button>
                <div id="usersList"></div>
                <hr>
                <div id="withdrawalsList"></div>
            </div>
        </div>
    </div>

    <script>
        // ================================================================
        // ۱. فقط یک بار اتصال به Supabase
        // ================================================================
        const supabaseUrl = 'https://fpogciahtzacgrglhmnx.supabase.co';
        const supabaseKey = 'sb_publishable_Gb3p43CBeX1VFOOzVtdI0w_IqNrVuEm';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const ADMIN_EMAIL = 'mhmdhsnjlyly140@gmail.com';

        // ================================================================
        // ۲. توابع کمکی
        // ================================================================
        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast';
            t.style.display = 'block';
            t.style.border = type === 'error' ? '2px solid red' : '2px solid green';
            clearTimeout(t._timer);
            t._timer = setTimeout(() => { t.style.display = 'none'; }, 3000);
        }

        // ================================================================
        // ۳. ثبت‌نام و ورود (global)
        // ================================================================
        window.registerUser = async function() {
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value.trim();

            if (!email || !password) {
                document.getElementById('regMessage').innerHTML = '<span class="error">ایمیل و رمز را پر کنید</span>';
                return;
            }

            try {
                const { error } = await supabase
                    .from('users')
                    .insert([{ email, password, balance: 0 }]);

                if (error) {
                    document.getElementById('regMessage').innerHTML = '<span class="error">' + error.message + '</span>';
                } else {
                    document.getElementById('regMessage').innerHTML = '<span class="success">ثبت‌نام موفق! وارد شوید.</span>';
                    document.getElementById('regEmail').value = '';
                    document.getElementById('regPassword').value = '';
                }
            } catch (err) {
                document.getElementById('regMessage').innerHTML = '<span class="error">' + err.message + '</span>';
            }
        };

        window.loginUser = async function() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            if (!email || !password) {
                document.getElementById('loginMessage').innerHTML = '<span class="error">ایمیل و رمز را پر کنید</span>';
                return;
            }

            try {
                const { data, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('email', email)
                    .eq('password', password);

                if (error || data.length === 0) {
                    document.getElementById('loginMessage').innerHTML = '<span class="error">ایمیل یا رمز اشتباه است</span>';
                } else {
                    const user = data[0];
                    document.getElementById('userEmail').innerText = user.email;
                    document.getElementById('dashboard').classList.remove('hidden');
                    document.getElementById('authPage').style.display = 'none';
                    document.getElementById('loginMessage').innerHTML = '';
                    showToast('✅ خوش آمدید', 'success');
                    // اگر کاربر ادمین است، دکمه پنل ادمین رو نشون بده
                    if (email === ADMIN_EMAIL) {
                        document.querySelector('#dashboard .box button:last-child').style.display = 'block';
                    } else {
                        document.querySelector('#dashboard .box button:last-child').style.display = 'none';
                    }
                }
            } catch (err) {
                document.getElementById('loginMessage').innerHTML = '<span class="error">' + err.message + '</span>';
            }
        };

        window.logoutUser = function() {
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('authPage').style.display = 'block';
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('adminPanel').classList.add('hidden');
            showToast('🚪 خارج شدید', 'success');
        };

        // ================================================================
        // ۴. پنل ادمین
        // ================================================================
        window.showAdminPanel = function() {
            document.getElementById('adminPanel').classList.remove('hidden');
            loadUsers();
            loadWithdrawals();
        };

        window.hideAdminPanel = function() {
            document.getElementById('adminPanel').classList.add('hidden');
        };

        window.loadUsers = async function() {
            try {
                const { data, error } = await supabase
                    .from('users')
                    .select('email, balance, created_at');

                if (error) {
                    document.getElementById('usersList').innerHTML = '<span class="error">خطا</span>';
                } else {
                    let html = '<table><tr><th>ایمیل</th><th>موجودی</th><th>تاریخ</th></tr>';
                    data.forEach(u => {
                        html += `<tr>
                            <td>${u.email}</td>
                            <td>${u.balance || 0}</td>
                            <td>${new Date(u.created_at).toLocaleDateString('fa-IR')}</td>
                        </tr>`;
                    });
                    html += '</table>';
                    document.getElementById('usersList').innerHTML = html;
                }
            } catch (err) {
                document.getElementById('usersList').innerHTML = '<span class="error">' + err.message + '</span>';
            }
        };

        window.loadWithdrawals = async function() {
            try {
                const { data, error } = await supabase
                    .from('withdraw_requests')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) {
                    document.getElementById('withdrawalsList').innerHTML = '<span class="error">خطا</span>';
                } else {
                    let html = '<table><tr><th>کاربر</th><th>مبلغ</th><th>وضعیت</th><th>عملیات</th></tr>';
                    data.forEach(w => {
                        html += `<tr>
                            <td>${w.user_email}</td>
                            <td>${w.amount}</td>
                            <td>${w.status}</td>
                            <td>
                                ${w.status === 'pending' ? `
                                    <button class="btn-sm green" onclick="approveWithdraw('${w.id}')">✅</button>
                                    <button class="btn-sm red" onclick="rejectWithdraw('${w.id}')">❌</button>
                                ` : '—'}
                            </td>
                        </tr>`;
                    });
                    html += '</table>';
                    document.getElementById('withdrawalsList').innerHTML = html;
                }
            } catch (err) {
                document.getElementById('withdrawalsList').innerHTML = '<span class="error">' + err.message + '</span>';
            }
        };

        window.approveWithdraw = async function(id) {
            if (!confirm('تأیید برداشت؟')) return;
            try {
                await supabase.from('withdraw_requests').update({ status: 'approved' }).eq('id', id);
                showToast('✅ تأیید شد', 'success');
                loadWithdrawals();
            } catch (err) {
                showToast('❌ خطا', 'error');
            }
        };

        window.rejectWithdraw = async function(id) {
            if (!confirm('رد برداشت؟')) return;
            try {
                await supabase.from('withdraw_requests').update({ status: 'rejected' }).eq('id', id);
                showToast('❌ رد شد', 'error');
                loadWithdrawals();
            } catch (err) {
                showToast('❌ خطا', 'error');
            }
        };
    </script>
</body>
</html>
