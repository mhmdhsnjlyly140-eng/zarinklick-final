<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل ادمین زرین‌کلیک</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Tahoma, sans-serif; max-width: 800px; margin: auto; padding: 20px; background: #f5f5f5; direction: rtl; }
        .box { background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        input, select, textarea { width: 100%; padding: 10px; margin: 6px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 8px; font-size: 16px; margin: 4px 0; cursor: pointer; }
        button:hover { background: #218838; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background: #4CAF50; color: white; }
        .btn-approve { background: #007bff; }
        .btn-reject { background: #dc3545; }
        .btn-approve:hover { background: #0056b3; }
        .btn-reject:hover { background: #c82333; }
        .btn-sm { padding: 4px 10px; font-size: 11px; border-radius: 8px; border: none; cursor: pointer; font-weight: 700; }
        .btn-sm.green { background: #92fe9d; color: #0b0e1a; }
        .btn-sm.red { background: #ff6b6b; color: #fff; }
        .btn-sm.blue { background: #00c9ff; color: #0b0e1a; }
        .hidden { display: none; }
        .error { color: red; }
        .success { color: green; }
        .admin-only { display: none; }
    </style>
</head>
<body>

    <h1>👑 پنل ادمین زرین‌کلیک</h1>

    <!-- فرم ورود ادمین -->
    <div class="box" id="adminLoginBox">
        <h3>ورود ادمین</h3>
        <input type="email" id="adminEmail" placeholder="ایمیل ادمین" value="mhmdhsnjlyly140@gmail.com">
        <input type="password" id="adminPassword" placeholder="رمز عبور">
        <button onclick="adminLogin()">ورود</button>
        <p id="adminLoginMessage"></p>
    </div>

    <!-- پنل ادمین -->
    <div class="box admin-only" id="adminPanel">
        <h3>📊 داشبورد ادمین</h3>
        <button onclick="loadUsers()">🔄 بارگذاری کاربران</button>
        <button onclick="loadWithdrawals()">🔄 بارگذاری درخواست‌های برداشت</button>
        <button onclick="loadTickets()">🔄 بارگذاری تیکت‌ها</button>
        <button onclick="logoutAdmin()">🚪 خروج</button>
        <hr>

        <h4>👥 لیست کاربران</h4>
        <div id="usersList"></div>

        <hr>
        <h4>🏦 درخواست‌های برداشت</h4>
        <div id="withdrawalsList"></div>

        <hr>
        <h4>📩 تیکت‌های پشتیبانی</h4>
        <div id="ticketsList"></div>

        <hr>
        <h4>🎫 ساخت کد شارژ (جایزه)</h4>
        <div class="input-group">
            <label>💰 مبلغ (تومان)</label>
            <input type="number" id="adminChargeAmount" placeholder="مبلغ را وارد کنید" min="1000" />
        </div>
        <div class="input-group">
            <label>تعداد کد</label>
            <input type="number" id="adminChargeCount" value="1" min="1" max="20" />
        </div>
        <button onclick="adminGenerateChargeCodes()">ساخت کد شارژ</button>
        <div id="adminChargeCodesResult" style="margin-top:10px;font-size:13px;color:#92fe9d;"></div>

        <hr>
        <h4>➕ ثبت تبلیغ بدون پرداخت (ادمین)</h4>
        <div class="input-group"><label>عنوان</label><input type="text" id="adminAdTitle" placeholder="عنوان" /></div>
        <div class="input-group"><label>شرح</label><textarea id="adminAdDesc" placeholder="توضیحات"></textarea></div>
        <div class="input-group"><label>دسته‌بندی</label><select id="adminAdCategory"><option value="فروشگاهی">فروشگاهی</option><option value="خدماتی">خدماتی</option><option value="آموزشی">آموزشی</option><option value="سرگرمی">سرگرمی</option><option value="دیجیتال">دیجیتال</option><option value="سایر">سایر</option></select></div>
        <div class="input-group"><label>تعداد بازدید (۱۰۰۰-۵۰۰۰۰)</label><input type="number" id="adminAdViews" value="1000" min="1000" max="50000" /></div>
        <div class="input-group"><label>درآمد هر کلیک (۵۰۰-۱۰۰۰۰۰ ریال)</label><input type="number" id="adminAdCpc" value="500" min="500" max="100000" /></div>
        <button onclick="adminCreateAd()">ثبت تبلیغ</button>
    </div>

    <script>
        // ======== اتصال به Supabase ========
        const supabaseUrl = 'https://fpogciahtzacgrglhmnx.supabase.co';
        const supabaseKey = 'sb_publishable_Gb3p43CBeX1VFOOzVtdI0w_IqNrVuEm';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const ADMIN_EMAIL = 'mhmdhsnjlyly140@gmail.com';

        // ======== ورود ادمین ========
        window.adminLogin = async function() {
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value.trim();

            if (!email || !password) {
                document.getElementById('adminLoginMessage').innerHTML = '<span class="error">ایمیل و رمز را پر کنید</span>';
                return;
            }

            if (email !== ADMIN_EMAIL) {
                document.getElementById('adminLoginMessage').innerHTML = '<span class="error">دسترسی غیرمجاز</span>';
                return;
            }

            try {
                const { data, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('email', email)
                    .eq('password', password);

                if (error || data.length === 0) {
                    document.getElementById('adminLoginMessage').innerHTML = '<span class="error">ایمیل یا رمز اشتباه است</span>';
                } else {
                    document.getElementById('adminLoginMessage').innerHTML = '<span class="success">ورود موفق! خوش آمدید ادمین</span>';
                    document.getElementById('adminLoginBox').style.display = 'none';
                    document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
                    loadUsers();
                    loadWithdrawals();
                    loadTickets();
                }
            } catch (err) {
                document.getElementById('adminLoginMessage').innerHTML = '<span class="error">خطا: ' + err.message + '</span>';
            }
        };

        // ======== بارگذاری کاربران ========
        window.loadUsers = async function() {
            try {
                const { data, error } = await supabase
                    .from('users')
                    .select('email, balance, ad_balance, referrals, created_at');

                if (error) {
                    document.getElementById('usersList').innerHTML = '<span class="error">خطا در بارگذاری کاربران</span>';
                } else {
                    let html = '<table><tr><th>ایمیل</th><th>کیف پول اصلی</th><th>کیف پول تبلیغ</th><th>زیرمجموعه</th><th>تاریخ ثبت</th></tr>';
                    data.forEach(user => {
                        html += `<tr>
                            <td>${user.email}</td>
                            <td>${user.balance || 0}</td>
                            <td>${user.ad_balance || 0}</td>
                            <td>${(user.referrals || []).length}</td>
                            <td>${new Date(user.created_at).toLocaleDateString('fa-IR')}</td>
                        </tr>`;
                    });
                    html += '</table>';
                    document.getElementById('usersList').innerHTML = html;
                }
            } catch (err) {
                document.getElementById('usersList').innerHTML = '<span class="error">خطا: ' + err.message + '</span>';
            }
        };

        // ======== بارگذاری درخواست‌های برداشت ========
        window.loadWithdrawals = async function() {
            try {
                const { data, error } = await supabase
                    .from('withdraw_requests')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) {
                    document.getElementById('withdrawalsList').innerHTML = '<span class="error">خطا در بارگذاری درخواست‌ها</span>';
                } else {
                    let html = '<table><tr><th>کاربر</th><th>مبلغ</th><th>کارمزد</th><th>خالص</th><th>کیف پول</th><th>وضعیت</th><th>عملیات</th></tr>';
                    data.forEach(req => {
                        html += `<tr>
                            <td>${req.user_email}</td>
                            <td>${req.amount}</td>
                            <td>${req.fee || 0}</td>
                            <td>${req.net_amount || req.amount}</td>
                            <td>${req.wallet_name || (req.wallet === 'balance' ? 'اصلی' : 'تبلیغ')}</td>
                            <td>${req.status === 'pending' ? '⏳ در انتظار' : req.status === 'approved' ? '✅ تأیید شده' : '❌ رد شده'}</td>
                            <td>
                                ${req.status === 'pending' ? `
                                    <button class="btn-sm green" onclick="approveWithdrawal('${req.id}')">✅ تأیید</button>
                                    <button class="btn-sm red" onclick="rejectWithdrawal('${req.id}')">❌ رد</button>
                                ` : '—'}
                            </td>
                        </tr>`;
                    });
                    html += '</table>';
                    document.getElementById('withdrawalsList').innerHTML = html;
                }
            } catch (err) {
                document.getElementById('withdrawalsList').innerHTML = '<span class="error">خطا: ' + err.message + '</span>';
            }
        };

        // ======== بارگذاری تیکت‌ها (از localStorage) ========
        window.loadTickets = function() {
            const tickets = JSON.parse(localStorage.getItem('tickets')) || {};
            let html = '<table><tr><th>کاربر</th><th>موضوع</th><th>وضعیت</th><th>عملیات</th></tr>';
            for (let key in tickets) {
                const t = tickets[key];
                html += `<tr>
                    <td>${t.userId || 'نامشخص'}</td>
                    <td>${t.subject}</td>
                    <td>${t.status === 'open' ? '🟡 باز' : t.status === 'answered' ? '🟢 پاسخ داده شده' : '🔴 بسته'}</td>
                    <td>
                        <button class="btn-sm blue" onclick="replyTicket('${key}')">پاسخ</button>
                        <button class="btn-sm red" onclick="closeTicket('${key}')">بستن</button>
                    </td>
                </tr>`;
            }
            html += '</table>';
            document.getElementById('ticketsList').innerHTML = html || '<p>هیچ تیکتی وجود ندارد</p>';
        };

        // ======== تأیید برداشت ========
        window.approveWithdrawal = async function(id) {
            if (!confirm('آیا از تأیید این برداشت مطمئن هستید؟')) return;

            try {
                const { error } = await supabase
                    .from('withdraw_requests')
                    .update({ status: 'approved' })
                    .eq('id', id);

                if (error) {
                    alert('خطا در تأیید برداشت');
                } else {
                    alert('✅ برداشت تأیید شد');
                    loadWithdrawals();
                }
            } catch (err) {
                alert('خطا: ' + err.message);
            }
        };

        // ======== رد برداشت ========
        window.rejectWithdrawal = async function(id) {
            if (!confirm('آیا از رد این برداشت مطمئن هستید؟')) return;

            try {
                const { error } = await supabase
                    .from('withdraw_requests')
                    .update({ status: 'rejected' })
                    .eq('id', id);

                if (error) {
                    alert('خطا در رد برداشت');
                } else {
                    alert('❌ برداشت رد شد');
                    loadWithdrawals();
                }
            } catch (err) {
                alert('خطا: ' + err.message);
            }
        };

        // ======== پاسخ به تیکت ========
        window.replyTicket = function(id) {
            const reply = prompt('پاسخ خود را وارد کنید:');
            if (!reply) return;
            const tickets = JSON.parse(localStorage.getItem('tickets')) || {};
            if (tickets[id]) {
                tickets[id].answer = reply;
                tickets[id].status = 'answered';
                localStorage.setItem('tickets', JSON.stringify(tickets));
                alert('✅ پاسخ ارسال شد');
                loadTickets();
            }
        };

        // ======== بستن تیکت ========
        window.closeTicket = function(id) {
            if (!confirm('آیا از بستن این تیکت مطمئن هستید؟')) return;
            const tickets = JSON.parse(localStorage.getItem('tickets')) || {};
            if (tickets[id]) {
                tickets[id].status = 'closed';
                localStorage.setItem('tickets', JSON.stringify(tickets));
                alert('✅ تیکت بسته شد');
                loadTickets();
            }
        };

        // ======== ساخت کد شارژ ========
        window.adminGenerateChargeCodes = function() {
            const amount = parseInt(document.getElementById('adminChargeAmount').value);
            const count = parseInt(document.getElementById('adminChargeCount').value) || 1;
            if (!amount || amount < 1000) {
                alert('❌ مبلغ را به‌درستی وارد کنید (حداقل ۱۰۰۰ تومان)');
                return;
            }

            let codes = JSON.parse(localStorage.getItem('chargeCodes')) || {};
            let resultHtml = '';
            for (let i = 0; i < count; i++) {
                const code = 'CH' + Math.floor(100000 + Math.random() * 900000);
                codes[code] = amount;
                resultHtml += `<div style="background:#0b0e1a;padding:4px 10px;border-radius:8px;margin:3px 0;display:flex;justify-content:space-between;font-size:13px;">
                    <span style="color:#ffd200;">${code}</span>
                    <span style="color:#92fe9d;">${amount.toLocaleString()} تومان</span>
                </div>`;
            }
            localStorage.setItem('chargeCodes', JSON.stringify(codes));
            document.getElementById('adminChargeCodesResult').innerHTML = `
                <div style="background:#1a3a1a;padding:10px;border-radius:12px;margin-top:5px;">
                    <div style="color:#92fe9d;font-weight:700;">✅ ${count} کد ساخته شد:</div>
                    ${resultHtml}
                </div>
            `;
            alert(`✅ ${count} کد شارژ ساخته شد`);
        };

        // ======== ثبت تبلیغ توسط ادمین ========
        window.adminCreateAd = async function() {
            const title = document.getElementById('adminAdTitle').value.trim();
            const desc = document.getElementById('adminAdDesc').value.trim();
            const category = document.getElementById('adminAdCategory').value;
            const views = parseInt(document.getElementById('adminAdViews').value) || 1000;
            const cpc = parseInt(document.getElementById('adminAdCpc').value) || 500;
            if (!title || !desc) {
                alert('❌ عنوان و شرح را پر کنید');
                return;
            }
            const totalToman = Math.round((views * cpc) / 10);
            const newAd = {
                id: Date.now().toString(),
                owner: ADMIN_EMAIL,
                title,
                desc,
                category,
                image: '',
                max_views: views,
                cpc,
                total_budget: totalToman,
                remaining_budget: totalToman,
                clicks: 0,
                status: 'active',
                clicked_by: {},
                ratings: {},
                created_at: Date.now()
            };
            let ads = JSON.parse(localStorage.getItem('ads')) || {};
            ads[newAd.id] = newAd;
            localStorage.setItem('ads', JSON.stringify(ads));
            alert(`✅ تبلیغ "${title}" توسط ادمین ثبت شد (رایگان)`);
            document.getElementById('adminAdTitle').value = '';
            document.getElementById('adminAdDesc').value = '';
        };

        // ======== خروج ادمین ========
        window.logoutAdmin = function() {
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
            document.getElementById('adminLoginBox').style.display = 'block';
            document.getElementById('adminLoginMessage').innerHTML = '';
            document.getElementById('adminPassword').value = '';
        };
    </script>
</body>
        </html>
